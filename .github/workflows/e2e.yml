name: E2E Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Get Supabase credentials
        id: supabase
        run: |
          eval "$(supabase status --output env)"
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "anon_key=${ANON_KEY}" >> "$GITHUB_OUTPUT"
          echo "service_role_key=${SERVICE_ROLE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Create E2E test users
        run: |
          API_URL="${{ steps.supabase.outputs.api_url }}"
          SERVICE_KEY="${{ steps.supabase.outputs.service_role_key }}"

          # Create each E2E user via Auth Admin API.
          # Uses a psql check-then-create pattern to be idempotent:
          # if the user already exists (e.g. in a future scenario where seed.sql
          # creates auth users), the curl is skipped cleanly.
          for EMAIL_PASS in \
            "admin@test.fieldmapper.org:test-admin-password-123" \
            "editor@test.fieldmapper.org:test-editor-password-123" \
            "onboard@test.fieldmapper.org:test-onboard-password-123"; do
            EMAIL="${EMAIL_PASS%%:*}"
            PASSWORD="${EMAIL_PASS#*:}"
            EXISTS=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -tAc \
              "SELECT COUNT(*) FROM auth.users WHERE email = '$EMAIL'")
            if [ "$EXISTS" = "0" ]; then
              curl -sf -X POST "${API_URL}/auth/v1/admin/users" \
                -H "apikey: ${SERVICE_KEY}" \
                -H "Authorization: Bearer ${SERVICE_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"${EMAIL}\",\"password\":\"${PASSWORD}\",\"email_confirm\":true}"
              echo "Created: $EMAIL"
            else
              echo "Already exists (skipped): $EMAIL"
            fi
          done

          # Safety-net: ensure public.users rows exist for all three E2E accounts.
          # handle_new_user trigger should have done this, but be explicit.
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -c "
            INSERT INTO public.users (id, email, email_verified, full_name, display_name)
            SELECT id, email, true, email, split_part(email, '@', 1)
            FROM auth.users
            WHERE email IN (
              'admin@test.fieldmapper.org',
              'editor@test.fieldmapper.org',
              'onboard@test.fieldmapper.org'
            )
            ON CONFLICT (id) DO UPDATE SET
              email_verified = true,
              full_name = COALESCE(EXCLUDED.full_name, public.users.full_name),
              display_name = COALESCE(EXCLUDED.display_name, public.users.display_name);
          "

      - name: Seed test data
        run: |
          # Remove the stub 'default' org inserted by migration 008 (setup_complete=false).
          # It pre-dates the test org in created_at, so Signal D would pick it first
          # and redirect authenticated users to /setup instead of /manage.
          # Must delete org_memberships first due to FK constraints.
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -c "
            DELETE FROM org_memberships
            WHERE org_id = (SELECT id FROM orgs WHERE slug = 'default' AND setup_complete = false LIMIT 1);
            DELETE FROM orgs WHERE slug = 'default' AND setup_complete = false;
          "
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -f supabase/scripts/seed-test-db.sql

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          # PLATFORM_DOMAIN intentionally NOT set — tenant resolution uses
          # Signal D (default org fallback) to pick the seeded test org.
          # Local dev:e2e uses the same approach.

      - name: Start app
        run: npm start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:3000; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          exit 1

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          TEST_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          TEST_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          TEST_USER_ADMIN_EMAIL: admin@test.fieldmapper.org
          TEST_USER_ADMIN_PASSWORD: test-admin-password-123
          TEST_USER_EDITOR_EMAIL: editor@test.fieldmapper.org
          TEST_USER_EDITOR_PASSWORD: test-editor-password-123
          TEST_USER_ONBOARD_EMAIL: onboard@test.fieldmapper.org
          TEST_USER_ONBOARD_PASSWORD: test-onboard-password-123
          CI: true

      - name: Collect visual diff images
        if: always()
        run: |
          mkdir -p playwright-report/visual-diffs
          find e2e/test-results -name '*-actual.png' -o -name '*-expected.png' -o -name '*-diff.png' | while read f; do
            cp "$f" playwright-report/visual-diffs/
          done
          echo "Collected $(ls playwright-report/visual-diffs/*.png 2>/dev/null | wc -l | tr -d ' ') visual diff images"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            playwright-report/
          retention-days: 14

      - name: Deploy report to GitHub Pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          destination_dir: e2e-report/${{ github.run_id }}
          keep_files: true

      - name: Post PR comment with report link
        if: always() && github.event_name == 'pull_request'
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/e2e-report/${{ github.run_id }}"
          DEPLOYMENT_REF="${{ github.head_ref }}" \
          DEPLOYMENT_URL="$REPORT_URL" \
          REPORT_URL="$REPORT_URL" \
          bash scripts/post-e2e-comment.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
