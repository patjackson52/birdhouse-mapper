name: E2E Tests

on:
  deployment_status:

jobs:
  playwright:
    name: Playwright E2E
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Get Supabase credentials
        id: supabase
        run: |
          echo "api_url=$(supabase status | grep 'API URL' | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(supabase status | grep 'anon key' | awk '{print $NF}')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(supabase status | grep 'service_role key' | awk '{print $NF}')" >> "$GITHUB_OUTPUT"

      - name: Create test users
        run: |
          API_URL="${{ steps.supabase.outputs.api_url }}"
          SERVICE_KEY="${{ steps.supabase.outputs.service_role_key }}"
          curl -s -X POST "${API_URL}/auth/v1/admin/users" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.fieldmapper.org","password":"test-admin-password-123","email_confirm":true}'
          curl -s -X POST "${API_URL}/auth/v1/admin/users" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"email":"editor@test.fieldmapper.org","password":"test-editor-password-123","email_confirm":true}'

      - name: Seed test data
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -f supabase/scripts/seed-test-db.sql --quiet

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
          TEST_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          TEST_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          TEST_USER_ADMIN_EMAIL: admin@test.fieldmapper.org
          TEST_USER_ADMIN_PASSWORD: test-admin-password-123
          TEST_USER_EDITOR_EMAIL: editor@test.fieldmapper.org
          TEST_USER_EDITOR_PASSWORD: test-editor-password-123
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            playwright-report/
          retention-days: 14

      - name: Post PR comment
        if: always()
        run: bash scripts/post-e2e-comment.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENT_URL: ${{ github.event.deployment_status.target_url }}
          DEPLOYMENT_REF: ${{ github.event.deployment.ref }}
